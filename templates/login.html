<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#7c3aed);
}

.login-box{
width:380px;
background:#fff;
padding:40px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,.2);
}

h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

input{
width:100%;
padding:12px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

input:focus{
outline:none;
border-color:#4f46e5;
}

button{
width:100%;
padding:12px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

.error{
color:red;
text-align:center;
margin-bottom:15px;
}

</style>

</head>
<body>

<div class="login-box">

<h2>Login</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="error">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</div>

</body>
</html>
